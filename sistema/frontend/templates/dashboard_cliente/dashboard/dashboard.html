<!-- SCRIPT BUSCA -->
<script>
const searchBtn = document.getElementById('searchBtn');
const searchBox = document.getElementById('searchBox');
const searchInput = document.getElementById('searchInput');
const menu = document.getElementById('mainMenu');

let open = false;

searchBtn.onclick = (e) => {
  e.stopPropagation();
  open = !open;

  if (open) {
    // abre busca
    searchBox.classList.remove('w-0');
    searchBox.classList.add('w-[300px]');

    // ESCONDE MENU (forçado)
    menu.style.display = 'none';

    searchInput.focus();
  } else {
    // fecha busca
    searchBox.classList.add('w-0');
    searchBox.classList.remove('w-[300px]');

    // MOSTRA MENU
    menu.style.display = 'flex';
  }
};

// clicar fora fecha
document.addEventListener('click', (e) => {
  if (open && !searchBox.contains(e.target) && e.target !== searchBtn) {
    searchBox.classList.add('w-0');
    searchBox.classList.remove('w-[300px]');
    menu.style.display = 'flex';
    open = false;
  }
});
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const btn = document.getElementById('userMenuBtn');
  const menu = document.getElementById('userDropdown');

  // evita erro se não existir na página
  if (!btn || !menu) return;

  btn.addEventListener('click', function (e) {
    e.stopPropagation(); // evita fechar imediatamente
    menu.classList.toggle('hidden');
  });

  // fechar ao clicar fora
  document.addEventListener('click', function (e) {
    if (!btn.contains(e.target) && !menu.contains(e.target)) {
      menu.classList.add('hidden');
    }
  });
});
</script>
