{% block trending %}

<section class="max-w-7xl mx-auto px-4 py-6">
<h3 class="text-base font-bold text-fire mb-3">🆕 Atualizados Recentemente</h3>
<!-- 🆕 RECENTES -->
<div class="flex gap-2 overflow-x-auto pb-2">
  

  {% for anime in recentes %}

  <a href="{% url 'frontend:obra' anime.slug %}"
     class="obra w-[70px] sm:w-[80px] md:w-[90px] group cursor-pointer block"
     data-title="{{ anime.titulo }}"
     data-tags="{% for g in anime.generos.all %}{{ g.nome }}{% if not forloop.last %}, {% endif %}{% endfor %}"
     data-sinopse="{{ anime.descricao }}">

    <div class="relative overflow-hidden rounded-md">
      <img src="{{ anime.imagem.url }}"
           class="w-full aspect-[2/3] object-cover group-hover:scale-105 transition duration-300">
    </div>

    <h4 class="text-[10px] font-semibold mt-1 truncate">
      {{ anime.titulo }}
    </h4>

    <p class="text-[9px] text-fire">
      🔥 {{ anime.total_visualizacoes }}
    </p>

  </a>

  {% empty %}

    <p class="text-xs text-gray-500">Nenhum anime recente</p>

  {% endfor %}

</div>

  <!-- 🔥 TRENDING -->
<h3 class="text-base font-bold text-fire mt-6 mb-3">
  🔥 Trending
  <span class="text-xs text-gray-400 ml-2" id="trendPageInfo"></span>
</h3>

<div id="trending-box" class="flex gap-2 overflow-x-auto pb-2"></div>

<!-- PAGINAÇÃO (SEM <a>) -->
<div class="flex justify-center mt-2 gap-2">

  <button id="prevTrend"
          class="px-2 py-1 bg-gray-800 text-white rounded">
    ←
  </button>

  <span class="text-gray-400 text-sm" id="trendCounter"></span>

  <button id="nextTrend"
          class="px-2 py-1 bg-gray-800 text-white rounded">
    →
  </button>

</div>




<script>
let currentTrendPage = 1;

async function loadTrending(page) {

  const res = await fetch(`/?api=trending&trend_page=${page}`);
  const data = await res.json();

  const box = document.getElementById("trending-box");

  box.innerHTML = data.results.map(anime => `
    <a href="/obra/${anime.slug}/"
       class="obra w-[70px] sm:w-[80px] md:w-[90px] group cursor-pointer block"
       data-title="${anime.titulo || ''}"
       data-tags="${anime.generos ? anime.generos.join(', ') : ''}"
       data-sinopse="${anime.descricao || ''}">

      <div class="relative overflow-hidden rounded-md">

        <img src="${anime.imagem || '/static/img/default.png'}"
             class="w-full aspect-[2/3] object-cover group-hover:scale-105 transition duration-300">

      </div>

      <h4 class="text-[10px] font-semibold mt-1 truncate text-center">
        ${anime.titulo || ''}
      </h4>

      <p class="text-[9px] text-fire text-center">
        🔥 ${anime.views || 0}
      </p>

    </a>
  `).join("");

  // 🔥 REATIVA TOOLTIP (ESSENCIAL)
  ativarTooltip();

  currentTrendPage = data.page;

  document.getElementById("trendCounter").innerText =
    `${data.page}/${data.num_pages}`;

  document.getElementById("prevTrend").disabled = !data.has_previous;
  document.getElementById("nextTrend").disabled = !data.has_next;
}

// eventos
document.getElementById("nextTrend").addEventListener("click", () => {
  loadTrending(currentTrendPage + 1);
});

document.getElementById("prevTrend").addEventListener("click", () => {
  loadTrending(currentTrendPage - 1);
});

// init
loadTrending(1);
</script>
<script>
function ativarTooltip() {

  const tooltip = document.getElementById("tooltip");

  document.querySelectorAll(".obra").forEach(el => {

    if (el.dataset.tooltipAtivo) return;
    el.dataset.tooltipAtivo = "true";

    el.addEventListener("mouseenter", () => {

      const title = el.dataset.title || "";
      const tags = el.dataset.tags || "";
      const sinopse = el.dataset.sinopse || "";

      tooltip.innerHTML = `
        <div class="text-xs font-bold mb-1">${title}</div>

        <div class="flex flex-wrap gap-1 mb-1">
          ${tags
            .split(',')
            .filter(Boolean)
            .map(tag => `
              <span class="bg-fire/20 text-fire px-1 py-[1px] rounded text-[9px]">
                ${tag.trim()}
              </span>
            `).join('')
          }
        </div>

        <div class="text-gray-300 text-[10px] leading-tight">
          ${sinopse}
        </div>
      `;

      tooltip.classList.remove("hidden");
    });

    el.addEventListener("mousemove", (e) => {
      const offset = 15;

      let x = e.clientX + offset;
      let y = e.clientY + offset;

      const rect = tooltip.getBoundingClientRect();

      if (x + rect.width > window.innerWidth) {
        x = e.clientX - rect.width - offset;
      }

      if (y + rect.height > window.innerHeight) {
        y = e.clientY - rect.height - offset;
      }

      tooltip.style.left = x + "px";
      tooltip.style.top = y + "px";
    });

    el.addEventListener("mouseleave", () => {
      tooltip.classList.add("hidden");
    });

  });
}
</script>
</div>

</section>

<!-- TOOLTIP GLOBAL -->

     class="fixed z-50 hidden w-56 p-3 rounded-lg bg-gray-900/95 backdrop-blur text-white text-xs shadow-xl border border-gray-700 pointer-events-none">
</div>

<script>

      if (el.dataset.tooltipAtivo) return;

        const sinopse = el.dataset.sinopse;

        tooltip.innerHTML = `

          <div class="flex flex-wrap gap-1 mb-1">
            ${tags.split(',').map(tag =>

            ).join('')}
          </div>

          <div class="text-gray-300 text-[10px] leading-tight">
            ${sinopse}
          </div>
        `;

        tooltip.classList.remove("hidden");
      });

      el.addEventListener("mousemove", (e) => {
        const offset = 15;

        let x = e.clientX + offset;
        let y = e.clientY + offset;

        const rect = tooltip.getBoundingClientRect();

        if (x + rect.width > window.innerWidth) {
          x = e.clientX - rect.width - offset;
        }

        if (y + rect.height > window.innerHeight) {
          y = e.clientY - rect.height - offset;
        }

        tooltip.style.left = x + "px";
        tooltip.style.top = y + "px";
      });

      el.addEventListener("mouseleave", () => {
        tooltip.classList.add("hidden");
      });

    });
  }

  ativarTooltip();

});
</script>

{% endblock %}
